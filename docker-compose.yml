version: '3.8'



services:

  postgres:

    image: postgres:15-alpine

    environment:

      POSTGRES_USER: welp

      POSTGRES_PASSWORD: welp123

      POSTGRES_DB: welp

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    networks:

      - welp-network



  backend:

    build: ./backend

    ports:

      - "5000:5000"

    environment:

      DATABASE_URL: postgresql://welp:welp123@postgres:5432/welp

      JWT_SECRET: your-super-secret-jwt-key-change-in-production

      NODE_ENV: development
      ML_MODERATION_URL: http://content-moderation:8000/moderate-review
      ML_SENTIMENT_URL: http://sentiment-analysis:8001/analyze-sentiment

    depends_on:

      - postgres
      - content-moderation
      - sentiment-analysis

    volumes:

      - ./backend:/app

      - /app/node_modules

    networks:

      - welp-network


  content-moderation:

    build: ./ml-services/content-moderation

    ports:

      - "8000:8000"

    networks:

      - welp-network



  sentiment-analysis:

    build: ./ml-services/sentiment-analysis

    ports:

      - "8001:8001"

    networks:

      - welp-network



  recommendation-engine:

    build: ./ml-services/recommendation-engine

    ports:

      - "8002:8002"

    networks:

      - welp-network



  image-analysis:

    build: ./ml-services/image-analysis

    ports:

      - "8003:8003"

    networks:

      - welp-network



  fraud-detection:

    build: ./ml-services/fraud-detection

    ports:

      - "8004:8004"

    networks:

      - welp-network


  frontend:

    build: ./frontend

    ports:

      - "5173:5173"

    environment:

      VITE_API_URL: http://localhost:5000/api

    depends_on:

      - backend

    volumes:

      - ./frontend:/app

      - /app/node_modules

    networks:

      - welp-network



volumes:

  postgres_data:



networks:

  welp-network:

    driver: bridge

