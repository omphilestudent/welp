<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Welp - Employee wellbeing review platform where employees safely review companies, businesses respond, and psychologists help when needed." />
    <meta name="keywords" content="employee reviews, company reviews, workplace wellbeing, psychologist support" />
    <title>Welp - Employee Reviews & Wellbeing</title>
</head>
<body>
<script>
    (function () {
        try {
            var saved = localStorage.getItem('theme');
            document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
        } catch (error) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    })();
</script>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
